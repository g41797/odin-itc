name: Deploy docs to GitHub pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_COLOR: "1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03
      - name: Get commonmark
        run: sudo apt-get install libcmark-dev
      - name: Get and build Odin docs generator
        run: |
          mkdir -p tools
          cd /home/runner
          git clone https://github.com/odin-lang/pkg.odin-lang.org odin-doc
          cd odin-doc
          # Build renderer and place it where generate.sh expects it
          odin build . -out:$GITHUB_WORKSPACE/tools/odin-doc -o:speed
      - uses: actions/checkout@v4
      - name: Generate documentation
        run: ./docs/generate.sh
      - uses: actions/configure-pages@v3
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/build
      - uses: actions/deploy-pages@v4
        id: deployment
