name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        opt: [debug, speed, size, compat]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          # Use 'master' for latest fixes or a specific version like 'dev-2024-05'
          odin-version: master

      - name: Build (Strict Vet)
        # We build the package to check for compilation and vet errors
        # -vet: enables all semantic checks
        # -strict-style: enforces Odin's idiomatic styling
        # -disallow-do: forces explicit block braces for better readability
        run: |
          odin build . -no-entrypoint -vet -strict-style -disallow-do -o:${{ matrix.opt }}

      - name: Run Tests
        # We run the tests using the same strict settings
        # This ensures the logic holds up under different optimization levels
        run: |
          odin test . -vet -strict-style -disallow-do -o:${{ matrix.opt }}

      - name: Check Documentation
        # Ensures that the code can be parsed for documentation generation
        run: |
          odin doc . -all-packages